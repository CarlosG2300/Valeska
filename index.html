<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Valeska</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Pacifico&family=Great+Vibes&family=Playfair+Display+SC:wght@700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ===== CANVAS DE LLUVIA DE CORAZONES ===== */
        #heartRain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* ===== COUNTDOWN OVERLAY ===== */
        #countdown-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
            overflow: hidden;
        }

        #countdown-number {
            font-family: 'Playfair Display SC', serif;
            font-size: 24rem;
            font-weight: 700;
            color: #ff1744;
            text-shadow:
                0 0 10px #ff1744,
                0 0 20px #ff1744,
                0 0 40px #ff073a,
                0 0 80px #ff073a,
                0 0 120px #ff073a;
            animation: countPulse 0.8s ease-in-out infinite;
            user-select: none;
            z-index: 2;
        }

        .click-prompt {
            font-family: 'Pacifico', cursive;
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            z-index: 3;
            animation: blink 1.5s ease-in-out infinite;
            user-select: none;
            padding: 15px 0;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        /* Corazones cayendo durante la cuenta regresiva */
        .countdown-heart {
            position: absolute;
            top: -60px;
            color: #ff1744;
            font-size: 30px;
            z-index: 1;
            filter: drop-shadow(0 0 6px #ff073a);
            animation: countdownFall linear forwards;
            user-select: none;
            pointer-events: none;
        }

        @keyframes countdownFall {
            to {
                transform: translateY(120vh) rotate(360deg);
                opacity: 0;
            }
        }

        @keyframes countPulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.15);
                opacity: 0.85;
            }
        }

        /* ===== CONTENIDO PRINCIPAL ===== */
        #main-content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
            opacity: 0;
            transform: scale(0.8);
            transition: opacity 1s ease, transform 1s ease;
            max-width: 90%;
        }

        #main-content.visible {
            opacity: 1;
            transform: scale(1);
        }

        /* Corazón principal animado */
        .neon-heart {
            display: block;
            margin: 0 auto 15px auto;
            width: 80px;
            height: auto;
            animation: heartbeat 1.2s infinite;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.6)) drop-shadow(0 0 25px rgba(255, 255, 255, 0.3));
        }

        @keyframes heartbeat {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.25);
            }
        }

        /* Texto neón rojo con borde blanco */
        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 7rem;
            color: #ff1744;
            -webkit-text-stroke: 2px white;
            paint-order: stroke fill;
            text-shadow:
                0 0 7px #ff1744,
                0 0 15px #ff1744,
                0 0 30px #ff073a,
                0 0 60px #ff073a;
            margin-bottom: 15px;
            animation: glowPulse 2s ease-in-out infinite alternate;
        }

        p {
            font-family: 'Pacifico', cursive;
            color: #ff1744;
            font-size: 2.6rem;
            line-height: 1.8;
            -webkit-text-stroke: 1px white;
            paint-order: stroke fill;
            margin-bottom: 10px;
        }

        p b {
            font-size: 3rem;
        }

        @keyframes glowPulse {
            0% {
                text-shadow:
                    0 0 7px #ff1744,
                    0 0 15px #ff1744,
                    0 0 30px #ff073a,
                    0 0 60px #ff073a;
            }

            100% {
                text-shadow:
                    0 0 10px #ff1744,
                    0 0 25px #ff1744,
                    0 0 50px #ff073a,
                    0 0 90px #ff073a,
                    0 0 130px #ff073a;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            #countdown-number {
                font-size: 12rem;
            }

            .click-prompt {
                font-size: 1rem;
            }

            h1 {
                font-size: 3.5rem;
                -webkit-text-stroke: 1.5px white;
            }

            p {
                font-size: 1.6rem;
                -webkit-text-stroke: 0.5px white;
            }

            p b {
                font-size: 1.8rem;
            }

            .neon-heart {
                font-size: 45px;
            }

            #main-content {
                padding: 1rem;
                max-width: 95%;
            }
        }

        @media (max-width: 400px) {
            #countdown-number {
                font-size: 8rem;
            }

            .click-prompt {
                font-size: 0.85rem;
            }

            h1 {
                font-size: 2.5rem;
                -webkit-text-stroke: 1px white;
            }

            p {
                font-size: 1.2rem;
            }

            p b {
                font-size: 1.4rem;
            }

            .neon-heart {
                font-size: 35px;
            }
        }
    </style>
</head>

<body>

    <!-- Canvas para la lluvia de corazones estilo Matrix -->
    <canvas id="heartRain"></canvas>

    <!-- Cuenta regresiva -->
    <div id="countdown-overlay">
        <div class="click-prompt">👆 Toca la pantalla para activar el sonido</div>
        <div id="countdown-number">3</div>
        <div class="click-prompt">👆 Toca la pantalla para activar el sonido</div>
    </div>

    <!-- Contenido principal -->
    <div id="main-content">
        <img src="2.png" alt="Corazón" class="neon-heart">
        <h1>¡Yo te amo, Valeska!</h1>
        <p>Eres la persona más especial en mi vida y quería recordártelo de una forma diferente.</p>
        <p><b>Vales todo para mí.</b></p>
        <p style="margin-top: 20px; font-style: italic;">❝No te pienso dar la mitad de mi corazón, yo te lo doy
            completo.❞</p>
    </div>

    <!-- Música de fondo -->
    <audio id="bgMusic" src="1.mp3" loop preload="auto"></audio>

    <script>
        // ===== MÚSICA DE FONDO =====
        const bgMusic = document.getElementById('bgMusic');
        bgMusic.volume = 0.5;

        // Intentar autoplay
        const playPromise = bgMusic.play();
        if (playPromise !== undefined) {
            playPromise.catch(() => {
                // Si el navegador bloquea autoplay, reproducir al primer clic
                const startMusic = () => {
                    bgMusic.play();
                    document.removeEventListener('click', startMusic);
                    document.removeEventListener('touchstart', startMusic);
                };
                document.addEventListener('click', startMusic);
                document.addEventListener('touchstart', startMusic);
            });
        }
        // ===== LLUVIA DE CORAZONES ESTILO MATRIX =====
        const canvas = document.getElementById('heartRain');
        const ctx = canvas.getContext('2d');

        const hearts = ['❤', '♥', '💕', '♡', '❣'];
        const fontSize = 16;
        let columns;
        let drops = [];
        let speeds = [];

        function initRain() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            columns = Math.floor(canvas.width / fontSize);

            // Reiniciar arrays para todas las columnas
            drops = [];
            speeds = [];
            for (let i = 0; i < columns; i++) {
                drops[i] = Math.random() * -100;
                speeds[i] = 0.3 + Math.random() * 0.8;
            }
        }
        initRain();
        window.addEventListener('resize', initRain);

        function drawMatrixHearts() {
            // Fondo semi-transparente negro para el efecto trail
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = fontSize + 'px serif';

            for (let i = 0; i < columns; i++) {
                const heart = hearts[Math.floor(Math.random() * hearts.length)];

                const x = i * fontSize;
                const y = drops[i] * fontSize;

                // Brillo aleatorio para efecto de cascada
                const brightness = Math.random();
                if (brightness > 0.7) {
                    ctx.fillStyle = '#ff4081';
                    ctx.shadowColor = '#ff1744';
                    ctx.shadowBlur = 15;
                } else if (brightness > 0.3) {
                    ctx.fillStyle = '#d50032';
                    ctx.shadowColor = '#ff073a';
                    ctx.shadowBlur = 5;
                } else {
                    ctx.fillStyle = '#8b0020';
                    ctx.shadowColor = 'transparent';
                    ctx.shadowBlur = 0;
                }

                ctx.fillText(heart, x, y);

                // Resetear si pasa el borde inferior
                if (y > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                    speeds[i] = 0.3 + Math.random() * 0.8;
                }

                drops[i] += speeds[i];
            }

            ctx.shadowBlur = 0;
            requestAnimationFrame(drawMatrixHearts);
        }

        // Iniciar la lluvia inmediatamente
        drawMatrixHearts();

        // ===== CORAZONES CAYENDO DURANTE COUNTDOWN =====
        const countdownOverlay = document.getElementById('countdown-overlay');
        let countdownHeartsActive = true;

        function spawnCountdownHeart() {
            if (!countdownHeartsActive) return;
            const h = document.createElement('div');
            h.classList.add('countdown-heart');
            h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
            h.style.left = Math.random() * 100 + 'vw';
            h.style.fontSize = (20 + Math.random() * 25) + 'px';
            h.style.animationDuration = (2 + Math.random() * 3) + 's';
            h.style.opacity = 0.4 + Math.random() * 0.6;
            countdownOverlay.appendChild(h);
            h.addEventListener('animationend', () => h.remove());

            // Pocos corazones: intervalo largo aleatorio
            setTimeout(spawnCountdownHeart, 400 + Math.random() * 800);
        }
        spawnCountdownHeart();

        // ===== CUENTA REGRESIVA 3, 2, 1 =====
        const countdownNumber = document.getElementById('countdown-number');
        const mainContent = document.getElementById('main-content');

        let count = 3;

        function runCountdown() {
            const countInterval = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownNumber.style.opacity = '0';
                    countdownNumber.style.transform = 'scale(0.5)';
                    setTimeout(() => {
                        countdownNumber.textContent = count;
                        countdownNumber.style.opacity = '1';
                        countdownNumber.style.transform = 'scale(1)';
                    }, 300);
                } else if (count === 0) {
                    countdownNumber.style.opacity = '0';
                    countdownNumber.style.transform = 'scale(0.5)';
                    setTimeout(() => {
                        countdownNumber.textContent = '❤️';
                        countdownNumber.style.opacity = '1';
                        countdownNumber.style.transform = 'scale(1)';
                    }, 300);
                } else {
                    clearInterval(countInterval);
                    countdownHeartsActive = false;
                    countdownOverlay.style.opacity = '0';
                    setTimeout(() => {
                        countdownOverlay.style.display = 'none';
                        mainContent.classList.add('visible');
                    }, 500);
                }
            }, 1000);
        }

        // Agregar transición al número
        countdownNumber.style.transition = 'opacity 0.3s ease, transform 0.3s ease';

        // Iniciar cuenta regresiva después de un breve momento
        setTimeout(runCountdown, 500);
    </script>
</body>

</html>
